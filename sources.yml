  - website: 台中區農業改良場最新消息
    url: https://www.tcdares.gov.tw/api.php?theme=news&sub_theme=hot&format=rss
    output_heading: 台中農改場－最新消息
    enabled: true
    exclude_title_patterns:
      - '協助.*公告'
      - '職缺|徵才|約用人員|約僱人員|資格審查|合格名單|錄取人員名單|遴選|甄選結果|移撥|標售|招標'
      - '會議活動排程表'
      - 'AXIS|數位領袖班'
      - '業界參與補助|補助公告|補助實施計畫'

  - website: 高雄區農業改良場公告資訊
    url: https://www.kdais.gov.tw/theme_list.php?theme=news&sub_theme=announcement
    output_heading: 高雄農改場－公告資訊
    enabled: true
    parser: dares_html_list
    include_title_patterns:
      - '雨後|鋒面|防汛|汛期|病害|玉荷包.*穩產技術觀摩'
    exclude_title_patterns:
      - '協助.*公告'
      - '職缺|徵才|約用|約僱|資格審查|合格名單|錄取|遴選|甄選|甄試|移撥|標售|招標'
      - '省工高效及碳匯農機補助|業界參與補助|補助公告|補助實施計畫'
      - '租稅|稅務|繪畫比賽|夏令營'
      - '開放參觀日|成果特展|家政'
      - '延期|另行通知'

  - website: 台南區農業改良場本場快訊
    url: https://www.tndais.gov.tw/theme_list.php?theme=news_list
    output_heading: 台南農改場－本場快訊
    enabled: true
    parser: dares_html_list
    include_title_patterns:
      - '豪雨|變天下雨|積水|田間排水|作物病害|防治病害'
      - '國產火鶴花|專用保鮮劑|蘆筍栽培.*機械作業'
      - '西瓜技術諮詢講習|大蒜技術諮詢講習|文旦修剪枝條.*土壤增匯'
    exclude_title_patterns:
      - '協助.*公告'
      - '職缺|徵才|約用|約僱|資格審查|合格名單|錄取|遴選|甄選|甄試|移撥|標售|招標'
      - '省工高效及碳匯農機補助|業界參與補助|補助公告|補助實施計畫'
      - '租稅|稅務|繪畫比賽|夏令營'
      - '開放參觀日|成果特展|家政'
      - '延期|另行通知'

  - website: 台東區農業改良場新聞
    url: https://www.ttdares.gov.tw/theme_list.php?theme=news&sub_theme=news
    output_heading: 台東農改場－新聞
    enabled: true
    parser: dares_html_list
    include_title_patterns:
      - '梅子友善栽培|芒果栽培|水稻田間歇灌溉'
      - '禾蛛緣椿象|白將軍|白殭菌'
      - '落實有機及友善環境耕作'

  - website: 台東區農業改良場活動
    url: https://www.ttdares.gov.tw/theme_list.php?theme=news&sub_theme=activity
    output_heading: 台東農改場－活動
    enabled: false
    parser: dares_html_list
    exclude_title_patterns:
      - '開放參觀日|成果特展|家政'
      - '延期|另行通知'

  - website: 台東區農業改良場公告
    url: https://www.ttdares.gov.tw/theme_list.php?theme=news&sub_theme=announcement
    output_heading: 台東農改場－公告
    enabled: false
    parser: dares_html_list
    exclude_title_patterns:
      - '協助.*公告'
      - '職缺|徵才|約用|約僱|資格審查|合格名單|錄取|遴選|甄選|甄試|移撥|標售|招標'
      - '省工高效及碳匯農機補助|業界參與補助|補助公告|補助實施計畫'
      - '租稅|稅務|繪畫比賽|夏令營'
      - '延期|另行通知'

  - website: 台東區農業改良場警報
    url: https://www.ttdares.gov.tw/theme_list.php?theme=news&sub_theme=warning
    output_heading: 台東農改場－警報
    enabled: false
    parser: dares_html_list

  - website: 上下游新聞
    url: https://www.newsmarket.com.tw/
    output_heading: 上下游
    enabled: true
    exclude_title_patterns:
      - '營養午餐|午餐法'
      - '連署|透明餐桌|原料來源標示'
      - '餐桌解密|冰淇淋'
      - '清酒米'

  - website: 農藥資訊服務網
    url: https://pesticide.aphia.gov.tw/information/Data/NewsLast
    output_heading: 農藥與法規修正彙整表
    enabled: true
    include_title_patterns:
      - '^公告修正「.+」農藥使用方法'
      - '^公告「.+」農藥使用方法'
      - '^預先通知公告「.+」農藥使用方法'
      - '更新通知$'

  - website: 疫情預警
    url: https://phis.aphia.gov.tw/list-1-102
    output_heading: 植物疫情彙整表
    enabled: true

  - website: 衛生福利部食品藥物管理署
    url: https://www.fda.gov.tw/TC/news.aspx?cid=3
    output_heading: 衛福部食藥署
    enabled: true
    parser: fda_news_table
    query_keyword: 農藥殘留容許量標準
    include_title_patterns:
      - '農藥殘留容許量標準'
    latest_only: true
    show_no_update: true
