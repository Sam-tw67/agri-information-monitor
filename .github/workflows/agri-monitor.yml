name: Agricultural information monitor

on:
  schedule:
    # 23:37 UTC Sun-Fri = 07:37 Asia/Taipei Mon-Sat (UTC+8, no DST).
    # Monday collects Saturday-Sunday; Tuesday-Saturday collect the previous day.
    - cron: "37 23 * * 0-5"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (do not write to Notion or send Email)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: agri-monitor-daily
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      ACRI_SOURCE_URL: https://mbox.acri.gov.tw/TA02.asp
      ACRI_NOTION_DATABASE_ID: e2c49f31c2424e9db4b37cb662e079ff
      ACRI_NOTION_DATA_SOURCE_ID: 2f330716-3b97-4782-99b7-c2eb898b2e36
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      TIMEZONE: Asia/Taipei
      SOURCES_FILE: sources.yml
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Run monitor
        shell: bash
        run: |
          args=()
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then args+=(--dry-run); fi
          python -m agri_monitor "${args[@]}"
